# Build wheels for Linux/macOS/Windows + an sdist and publish to PyPI via Trusted
# Publishing (OIDC — no API token). Runs on a version tag (e.g. `v0.1.0`); a manual
# run builds the artifacts but skips publishing.
#
# One-time PyPI setup (project owner): create a Trusted Publisher at
#   https://pypi.org/manage/account/publishing/  with
#     PyPI project name : dockq-rs
#     Owner             : aarteixeira
#     Repository        : dockq-rs
#     Workflow filename : release.yml
#     Environment       : pypi
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    name: wheels ${{ matrix.platform.os }}-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-22.04,   target: x86_64,  os: linux }
          - { runner: ubuntu-22.04,   target: aarch64, os: linux }
          - { runner: macos-13,       target: x86_64,  os: macos }
          - { runner: macos-14,       target: aarch64, os: macos }
          - { runner: windows-latest, target: x64,     os: windows }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: dockq-py
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dockq-py/dist/*.whl

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: dockq-py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dockq-py/dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/dockq-rs
    permissions:
      id-token: write # trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
